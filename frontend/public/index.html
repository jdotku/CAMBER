<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Tell the browser which character encoding to use -->
    <meta charset="utf-8" />

    <!-- Make the app look good on mobile devices (responsive) -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- The tab title shown in the browser -->
    <title>CAMBER</title>
  </head>
  <body>
    <!--
      This single <div> is where React "mounts" your entire app.
      React takes over this element and renders all your components inside it.
      You'll never need to add more HTML here — React handles everything.
    -->
    <div id="root"></div>
  </body>
</html>
